name: Validate Evidence Gates

on:
  workflow_dispatch:

jobs:
  validate-evidence:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate conformance artifacts
        run: |
          python tools/generate_ai_conformance_artifacts.py --repo-root .

      - name: Validate evidence gates
        run: |
          python tools/validate_evidence_gates.py --repo-root . --spec docs/releases/EARLY_BETA_CONFORMANCE_GATES.md
